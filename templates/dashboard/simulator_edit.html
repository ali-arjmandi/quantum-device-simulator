{% extends "base.html" %}

{% block title %}Edit device | Quantum Device Simulator{% endblock %}

{% block content %}
  <h1 class="mb-4">Edit device</h1>

  <div class="row">
    <div class="col-md-6 col-lg-5">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title mb-0">{{ device.name }}</h4>
        </div>
        <div class="card-body">
          <form action="{{ url_for('dashboard.edit_device', device_id=device.id) }}" method="post">
            <div class="form-group">
              <label for="name">Name</label>
              <input type="text" class="form-control" id="name" name="name" value="{{ device.name }}" placeholder="Device name" required>
            </div>
            <div class="form-group">
              <label for="device_type">Device type</label>
              <select class="form-control" id="device_type" name="device_type">
                <option value="sensor" {{ 'selected' if device.device_type == 'sensor' else '' }}>Sensor</option>
                <option value="actuator" {{ 'selected' if device.device_type == 'actuator' else '' }}>Actuator</option>
                <option value="satellite payload" {{ 'selected' if device.device_type == 'satellite payload' else '' }}>Satellite payload</option>
              </select>
            </div>
            <div class="form-group">
              <label for="connection_type">Connection type</label>
              <select class="form-control" id="connection_type" name="connection_type">
                <option value="Serial" {{ 'selected' if device.connection_type == 'Serial' else '' }}>Serial</option>
                <option value="TCP/IP" {{ 'selected' if device.connection_type == 'TCP/IP' else '' }}>TCP/IP</option>
                <option value="USB" {{ 'selected' if device.connection_type == 'USB' else '' }}>USB</option>
                <option value="I2C" {{ 'selected' if device.connection_type == 'I2C' else '' }}>I2C</option>
                <option value="SPI" {{ 'selected' if device.connection_type == 'SPI' else '' }}>SPI</option>
              </select>
            </div>
            {% set cp = (device.metadata or {}).get('connection_params') or {} %}
            <div class="form-group">
              <label class="d-block">Connection details</label>
              <div class="connection-details-block border rounded p-3 mb-0 {{ 'd-none' if device.connection_type != 'Serial' else '' }}" data-connection-type="Serial">
                <div class="form-group mb-2">
                  <label for="conn_port">Port</label>
                  <input type="text" class="form-control" id="conn_port" name="conn_port" placeholder="e.g. COM3, /dev/ttyUSB0" value="{{ cp.get('port', '') if device.connection_type == 'Serial' else '' }}">
                </div>
                <div class="form-group mb-2">
                  <label for="conn_baud_rate">Baud rate</label>
                  <input type="number" class="form-control" id="conn_baud_rate" name="conn_baud_rate" placeholder="e.g. 9600, 115200" min="1" max="921600" value="{{ cp.get('baud_rate', '') if device.connection_type == 'Serial' else '' }}">
                </div>
                <div class="form-group mb-2">
                  <label for="conn_data_bits">Data bits</label>
                  <select class="form-control" id="conn_data_bits" name="conn_data_bits">
                    <option value="">—</option>
                    <option value="7" {{ 'selected' if device.connection_type == 'Serial' and cp.get('data_bits') == 7 else '' }}>7</option>
                    <option value="8" {{ 'selected' if device.connection_type == 'Serial' and cp.get('data_bits') == 8 else '' }}>8</option>
                  </select>
                </div>
                <div class="form-group mb-2">
                  <label for="conn_stop_bits">Stop bits</label>
                  <select class="form-control" id="conn_stop_bits" name="conn_stop_bits">
                    <option value="">—</option>
                    <option value="1" {{ 'selected' if device.connection_type == 'Serial' and cp.get('stop_bits') == 1 else '' }}>1</option>
                    <option value="2" {{ 'selected' if device.connection_type == 'Serial' and cp.get('stop_bits') == 2 else '' }}>2</option>
                  </select>
                </div>
                <div class="form-group mb-0">
                  <label for="conn_parity">Parity</label>
                  <select class="form-control" id="conn_parity" name="conn_parity">
                    <option value="" {{ 'selected' if device.connection_type != 'Serial' or not cp.get('parity') else '' }}>None</option>
                    <option value="Even" {{ 'selected' if device.connection_type == 'Serial' and cp.get('parity') == 'Even' else '' }}>Even</option>
                    <option value="Odd" {{ 'selected' if device.connection_type == 'Serial' and cp.get('parity') == 'Odd' else '' }}>Odd</option>
                  </select>
                </div>
              </div>
              <div class="connection-details-block border rounded p-3 mb-0 {{ 'd-none' if device.connection_type != 'TCP/IP' else '' }}" data-connection-type="TCP/IP">
                <div class="form-group mb-2">
                  <label for="conn_host">Host</label>
                  <input type="text" class="form-control" id="conn_host" name="conn_host" placeholder="IP or hostname" value="{{ cp.get('host', '') if device.connection_type == 'TCP/IP' else '' }}">
                </div>
                <div class="form-group mb-0">
                  <label for="conn_tcp_port">Port</label>
                  <input type="number" class="form-control" id="conn_tcp_port" name="conn_tcp_port" placeholder="e.g. 502" min="1" max="65535" value="{{ cp.get('port', '') if device.connection_type == 'TCP/IP' else '' }}">
                </div>
              </div>
              <div class="connection-details-block border rounded p-3 mb-0 {{ 'd-none' if device.connection_type != 'USB' else '' }}" data-connection-type="USB">
                <div class="form-group mb-2">
                  <label for="conn_vendor_id">Vendor ID (hex)</label>
                  <input type="text" class="form-control" id="conn_vendor_id" name="conn_vendor_id" placeholder="e.g. 0x1234" value="{{ cp.get('vendor_id', '') if device.connection_type == 'USB' else '' }}">
                </div>
                <div class="form-group mb-2">
                  <label for="conn_product_id">Product ID (hex)</label>
                  <input type="text" class="form-control" id="conn_product_id" name="conn_product_id" placeholder="e.g. 0x5678" value="{{ cp.get('product_id', '') if device.connection_type == 'USB' else '' }}">
                </div>
                <div class="form-group mb-2">
                  <label for="conn_bus">Bus (optional)</label>
                  <input type="text" class="form-control" id="conn_bus" name="conn_bus" placeholder="e.g. 001" value="{{ cp.get('bus', '') if device.connection_type == 'USB' else '' }}">
                </div>
                <div class="form-group mb-2">
                  <label for="conn_device_path">Device path (optional)</label>
                  <input type="text" class="form-control" id="conn_device_path" name="conn_device_path" placeholder="e.g. /dev/bus/usb/001/002" value="{{ cp.get('device_path', '') if device.connection_type == 'USB' else '' }}">
                </div>
                <div class="form-group mb-0">
                  <label for="conn_serial_number">Serial number (optional)</label>
                  <input type="text" class="form-control" id="conn_serial_number" name="conn_serial_number" placeholder="Device serial" value="{{ cp.get('serial_number', '') if device.connection_type == 'USB' else '' }}">
                </div>
              </div>
              <div class="connection-details-block border rounded p-3 mb-0 {{ 'd-none' if device.connection_type != 'I2C' else '' }}" data-connection-type="I2C">
                <div class="form-group mb-2">
                  <label for="conn_i2c_bus">Bus number</label>
                  <input type="number" class="form-control" id="conn_i2c_bus" name="conn_i2c_bus" placeholder="e.g. 0, 1" min="0" value="{{ cp.get('bus', '') if device.connection_type == 'I2C' else '' }}">
                </div>
                <div class="form-group mb-0">
                  <label for="conn_i2c_address">Device address (7-bit hex)</label>
                  <input type="text" class="form-control" id="conn_i2c_address" name="conn_i2c_address" placeholder="e.g. 0x48" value="{{ (cp.get('device_address') or '') if device.connection_type == 'I2C' else '' }}">
                </div>
              </div>
              <div class="connection-details-block border rounded p-3 mb-0 {{ 'd-none' if device.connection_type != 'SPI' else '' }}" data-connection-type="SPI">
                <div class="form-group mb-2">
                  <label for="conn_spi_bus">Bus</label>
                  <input type="text" class="form-control" id="conn_spi_bus" name="conn_spi_bus" placeholder="e.g. 0" value="{{ cp.get('bus', '') if device.connection_type == 'SPI' else '' }}">
                </div>
                <div class="form-group mb-2">
                  <label for="conn_spi_cs">Chip select (CS)</label>
                  <input type="text" class="form-control" id="conn_spi_cs" name="conn_spi_cs" placeholder="e.g. 0" value="{{ cp.get('chip_select', '') if device.connection_type == 'SPI' else '' }}">
                </div>
                <div class="form-group mb-2">
                  <label for="conn_spi_mode">Mode (0–3)</label>
                  <select class="form-control" id="conn_spi_mode" name="conn_spi_mode">
                    <option value="">—</option>
                    <option value="0" {{ 'selected' if device.connection_type == 'SPI' and cp.get('mode') == 0 else '' }}>0</option>
                    <option value="1" {{ 'selected' if device.connection_type == 'SPI' and cp.get('mode') == 1 else '' }}>1</option>
                    <option value="2" {{ 'selected' if device.connection_type == 'SPI' and cp.get('mode') == 2 else '' }}>2</option>
                    <option value="3" {{ 'selected' if device.connection_type == 'SPI' and cp.get('mode') == 3 else '' }}>3</option>
                  </select>
                </div>
                <div class="form-group mb-2">
                  <label for="conn_spi_max_speed">Max speed (Hz, optional)</label>
                  <input type="number" class="form-control" id="conn_spi_max_speed" name="conn_spi_max_speed" placeholder="e.g. 1000000" min="0" value="{{ cp.get('max_speed', '') if device.connection_type == 'SPI' else '' }}">
                </div>
                <div class="form-group mb-0">
                  <label for="conn_spi_bit_order">Bit order (optional)</label>
                  <input type="text" class="form-control" id="conn_spi_bit_order" name="conn_spi_bit_order" placeholder="msb or lsb" value="{{ cp.get('bit_order', '') if device.connection_type == 'SPI' else '' }}">
                </div>
              </div>
            </div>
            <div class="form-group">
              <div class="form-check">
                <input type="checkbox" class="form-check-input" id="powered_on" name="powered_on" value="on" {{ 'checked' if device.powered_on else '' }}>
                <label class="form-check-label" for="powered_on">Powered on</label>
              </div>
            </div>
            <button type="submit" class="btn btn-primary">Save changes</button>
            <a href="{{ url_for('dashboard.simulator') }}" class="btn btn-secondary">Cancel</a>
          </form>
        </div>
      </div>
    </div>
  </div>
  <script>
    (function () {
      var connectionType = document.getElementById('connection_type');
      var blocks = document.querySelectorAll('.connection-details-block');
      function updateVisibility() {
        var value = connectionType.value;
        blocks.forEach(function (block) {
          if (block.getAttribute('data-connection-type') === value) {
            block.classList.remove('d-none');
          } else {
            block.classList.add('d-none');
          }
        });
      }
      connectionType.addEventListener('change', updateVisibility);
      updateVisibility();
    })();
  </script>
{% endblock %}
