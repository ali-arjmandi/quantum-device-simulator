{% extends "base.html" %}

{% block title %}Documentation | Quantum Device Simulator{% endblock %}

{% block content %}
  <h1 class="mb-4">Documentation</h1>

  <div class="card">
    <div class="card-body">
      <div class="documentation-content">
        {{ content | safe }}
      </div>
    </div>
  </div>
{% endblock %}

{% block head_css %}
  <style>
    .documentation-content h1 { font-size: 1.5rem; margin-top: 1rem; margin-bottom: 0.5rem; }
    .documentation-content h2 { font-size: 1.25rem; margin-top: 1rem; margin-bottom: 0.5rem; }
    .documentation-content h3 { font-size: 1.1rem; margin-top: 0.75rem; margin-bottom: 0.5rem; }
    .documentation-content ul, .documentation-content ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }
    .documentation-content p { margin-bottom: 0.75rem; }

    /* Inline code */
    .documentation-content code {
      background: #444 !important;
      color: #f8f9fa !important;
      padding: 0.15rem 0.35rem;
      border-radius: 3px;
      font-size: 0.9em;
    }

    /* Fenced code blocks (including diagrams) */
    .documentation-content pre,
    .documentation-content pre code,
    .documentation-content .codehilite,
    .documentation-content .codehilite pre,
    .documentation-content .codehilite code {
      background: #333 !important;
      color: #f8f9fa !important;
    }

    .documentation-content pre {
      padding: 1rem;
      border-radius: 4px;
      overflow-x: auto;
      margin-bottom: 0.75rem;
    }

    .documentation-content pre code {
      padding: 0;
    }
  </style>
{% endblock %}
